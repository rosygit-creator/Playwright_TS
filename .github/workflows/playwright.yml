name: Playwright Tests
on:
  # run when code is pushed/merged to main or master , git push origin main
  #direct commits to master
  #merging a feature branch into main
  
  push:
    branches: [ main, master ]
  # run when a PR is merged to main
  # run when a new PR is created
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      # run: npx playwright install --with-deps run tests in 3 browsers
      run: npx playwright install chromium # install only chromium

    - name: Run Playwright tests
      # run: npx playwright test , run tests on all browsers
      run: npx playwright test --project=chromium # run only on chromium
      
    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 10

    - name: Deploy Playwright report
      if: always()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./playwright-report

    - name: Send Slack notification
      if: ${{ !cancelled()  && github.ref == 'refs/heads/main' }}
      env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: |
        STATUS="✅ Passed"
        if [ "${{ job.status }}" != "success" ]; then
          STATUS="❌ Failed"
        fi

        REPORT_LINK="<https://rosygit-creator.github.io/Playwright_TS/|📊 View Playwright Report>"

        curl -X POST -H 'Content-type: application/json' \
        --data "{
          \"text\": \"*Playwright PR Tests Completed*\nStatus: $STATUS\nRepo: ${{ github.repository }}\nBranch: ${{ github.head_ref }}\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
        }" \
        $SLACK_WEBHOOK_URL

    
       